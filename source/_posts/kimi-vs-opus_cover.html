<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>头图（Medium 风格）— Claude Opus 4.7 vs Kimi 2.6</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0E0E10; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px 80px;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  }
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.92); padding: 14px 20px;
    display: flex; gap: 12px; justify-content: center; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .toolbar button {
    background: #C4956A; color: #1C1C1E; border: none;
    padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .toolbar button:hover { background: #d4a57a; }

  /* ─── Cover ─── */
  .cover {
    width: 900px; height: 383px; position: relative; overflow: hidden;
    border-radius: 8px;
  }
  .bg-dark { position: absolute; inset: 0; background: #1C1C1E; }

  /* 焦点视觉：右侧大尺寸“分差对比”插画 */
  .hero-art {
    position: absolute; right: 56px; top: 50%; transform: translateY(-50%);
    z-index: 1; opacity: 0.82;
  }

  /* 品牌角标 */
  .brand {
    position: absolute; top: 22px; left: 28px;
    display: flex; align-items: center; gap: 8px; z-index: 3;
  }
  .brand svg { width: 22px; height: 22px; }
  .brand-text {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.45); letter-spacing: 1px;
  }

  /* 内容：左对齐 */
  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 360px 0 60px; z-index: 2;
  }

  /* 编辑标签：金色细横线 + 小写字距 */
  .kicker {
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    color: #C4956A; text-transform: uppercase;
    padding-top: 12px; position: relative;
    margin-bottom: 18px;
  }
  .kicker::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 32px; height: 1px; background: #C4956A;
  }

  /* 主标题 */
  .title {
    font-size: 38px; font-weight: 800; letter-spacing: -0.022em;
    line-height: 1.18; color: #F2EDE3;
  }
  .title .hook {
    color: #C4956A; font-size: 60px; font-weight: 900;
    letter-spacing: -0.03em; line-height: 1;
    vertical-align: -2px; padding: 0 2px;
  }
  .title .vs {
    font-size: 30px; font-weight: 400; font-style: italic;
    color: rgba(255,255,255,0.45);
    margin: 0 6px; vertical-align: 4px;
  }

  /* 一句话副标题 */
  .lede {
    font-size: 17px; font-weight: 400; font-style: italic;
    color: rgba(255,255,255,0.55);
    margin-top: 20px; max-width: 480px; line-height: 1.55;
    letter-spacing: 0.2px;
  }

  .preview-secondary-hint {
    margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="downloadCover('main')">下载头图 (900×383)</button>
  <button onclick="downloadCover('secondary')">下载次图 (200×200)</button>
</div>

<div class="cover" id="cover-main">
  <div class="bg-dark"></div>

  <!-- 焦点视觉：双柱分差 + 节点对比图（91 / 68 隐喻） -->
  <div class="hero-art">
    <svg width="300" height="250" viewBox="0 0 300 250" fill="none">
      <!-- 顶部坐标线 -->
      <line x1="20" y1="20" x2="280" y2="20" stroke="#F2EDE3" stroke-width="0.6" opacity="0.2" stroke-dasharray="2,3"/>
      <text x="20" y="14" font-size="8" fill="rgba(255,255,255,0.35)" font-family="SF Mono, Menlo, monospace" letter-spacing="1">SCORE / 100</text>

      <!-- 左柱：Claude 91 -->
      <rect x="60" y="32" width="60" height="170" rx="3"
            fill="rgba(196,149,106,0.08)" stroke="#C4956A" stroke-width="1.5"/>
      <!-- 顶部刻度小标 -->
      <line x1="55" y1="32" x2="125" y2="32" stroke="#C4956A" stroke-width="1.5"/>
      <text x="90" y="56" font-size="22" fill="#F2EDE3" text-anchor="middle"
            font-family="-apple-system, sans-serif" font-weight="800" letter-spacing="-0.02em">91</text>
      <text x="90" y="218" font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle"
            font-family="SF Mono, Menlo, monospace" letter-spacing="1.5">CLAUDE 4.7</text>

      <!-- 右柱：Kimi 68 -->
      <rect x="170" y="91" width="60" height="111" rx="3"
            fill="rgba(242,237,227,0.04)" stroke="rgba(242,237,227,0.5)" stroke-width="1"/>
      <line x1="165" y1="91" x2="235" y2="91" stroke="rgba(242,237,227,0.6)" stroke-width="1"/>
      <text x="200" y="115" font-size="22" fill="rgba(242,237,227,0.85)" text-anchor="middle"
            font-family="-apple-system, sans-serif" font-weight="700" letter-spacing="-0.02em">68</text>
      <text x="200" y="218" font-size="9" fill="rgba(255,255,255,0.55)" text-anchor="middle"
            font-family="SF Mono, Menlo, monospace" letter-spacing="1.5">KIMI 2.6</text>

      <!-- 分差标尺：连接两柱顶端 -->
      <line x1="120" y1="32" x2="170" y2="91" stroke="#C4956A" stroke-width="0.8" opacity="0.4" stroke-dasharray="2,2"/>
      <!-- 25 分差额标签 -->
      <rect x="128" y="50" width="34" height="14" rx="2"
            fill="rgba(196,149,106,0.18)" stroke="#C4956A" stroke-width="0.6"/>
      <text x="145" y="60" font-size="8" fill="#C4956A" text-anchor="middle"
            font-family="SF Mono, Menlo, monospace" font-weight="700" letter-spacing="0.5">−23</text>

      <!-- 底部 axis 标签 -->
      <line x1="20" y1="232" x2="280" y2="232" stroke="#F2EDE3" stroke-width="0.6" opacity="0.2"/>
      <text x="150" y="246" font-size="8" fill="rgba(255,255,255,0.35)" text-anchor="middle"
            font-family="SF Mono, Menlo, monospace" letter-spacing="1">FLOWGRAPH SPEC · 1042 LINES</text>
    </svg>
  </div>

  <!-- 品牌角标 -->
  <div class="brand">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="13" cy="16" r="10" stroke="rgba(255,255,255,0.5)" stroke-width="2.2" fill="none"/>
      <ellipse cx="13" cy="8.5" rx="7" ry="1.5" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" fill="none"/>
      <ellipse cx="14" cy="17" rx="3.5" ry="2" fill="#C4956A"/>
      <polygon points="10,17 7.5,14.5 7.5,19.5" fill="#C4956A"/>
      <circle cx="16" cy="16.3" r="0.7" fill="#F2EDE3"/>
      <line x1="26" y1="4" x2="26" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
      <path d="M26 16 Q26 22 22 22" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="26" cy="4" r="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
    </svg>
    <span class="brand-text">墨筝</span>
  </div>

  <!-- 内容（左对齐） -->
  <div class="content">
    <div class="kicker">MODEL · BENCHMARK</div>
    <h1 class="title">同一份 1042 行规范，<br/>差出 <span class="hook">23</span> 分硬骨头</h1>
    <p class="lede">Claude Opus 4.7 vs Kimi 2.6——便宜五倍的代价，是租约、调度与 SSE 的全部失分。</p>
  </div>
</div>

<div class="preview-secondary-hint">↑ 主图（900×383）｜次图自动从左下裁切 kicker + 标题区域</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
function flattenAlpha(canvas, bgColor) {
  const isTransparent = !bgColor || bgColor === 'transparent' || bgColor === 'rgba(0, 0, 0, 0)';
  const flat = document.createElement('canvas');
  flat.width = canvas.width; flat.height = canvas.height;
  const ctx = flat.getContext('2d');
  ctx.fillStyle = isTransparent ? '#1C1C1E' : bgColor;
  ctx.fillRect(0, 0, flat.width, flat.height);
  ctx.drawImage(canvas, 0, 0);
  return flat;
}

async function renderSlide(el) {
  const origRadius = el.style.borderRadius;
  el.style.borderRadius = '0';
  const bgEl = el.querySelector('.bg-light, .bg-dark');
  const bg = bgEl ? getComputedStyle(bgEl).backgroundColor : getComputedStyle(el).backgroundColor;
  const raw = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null });
  el.style.borderRadius = origRadius;
  return flattenAlpha(raw, bg);
}

async function downloadCover(type) {
  const el = document.getElementById('cover-main');
  const canvas = await renderSlide(el);
  if (type === 'main') {
    canvas.toBlob(blob => saveAs(blob, 'kimi-vs-opus-头图.png'), 'image/png');
  } else {
    // 次图：从主图左侧裁 200×200（含 kicker + 标题首行 + hook 数字）
    const SRC_X = 100;
    const SRC_Y = 130;
    const SRC_SIZE = 500;
    const crop = document.createElement('canvas');
    crop.width = 400; crop.height = 400;
    const ctx = crop.getContext('2d');
    ctx.drawImage(canvas, SRC_X, SRC_Y, SRC_SIZE, SRC_SIZE, 0, 0, 400, 400);
    crop.toBlob(blob => saveAs(blob, 'kimi-vs-opus-次图.png'), 'image/png');
  }
}
</script>
</body>
</html>
