<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>封面 - Claude Code 的 48 条实用技巧与最佳实践</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 70px 20px 80px; font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif; }
.toolbar { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 12px 24px; display: flex; gap: 12px; z-index: 999; }
.toolbar button { padding: 8px 16px; border: none; border-radius: 6px; background: #C4956A; color: #fff; font-size: 14px; cursor: pointer; font-weight: 600; }
.toolbar button:hover { background: #b8845a; }
.cover { width: 900px; height: 383px; position: relative; overflow: hidden; border-radius: 8px; margin-bottom: 40px; }
.bg-dark { position: absolute; inset: 0; background: #1C1C1E; }
.bg-gradient { position: absolute; inset: 0; background: radial-gradient(ellipse at 30% 50%, rgba(196,149,106,0.06) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(196,149,106,0.04) 0%, transparent 50%); }

/* Medium 风格：左对齐 */
.content { position: absolute; inset: 0; display: flex; flex-direction: column; justify-content: center; padding: 0 360px 0 70px; z-index: 2; }
.kicker { font-size: 11px; font-weight: 700; letter-spacing: 0.18em; color: #C4956A; text-transform: uppercase; padding-top: 10px; position: relative; }
.kicker::before { content: ''; position: absolute; top: 0; left: 0; width: 32px; height: 1px; background: #C4956A; }
.title { font-size: 56px; font-weight: 800; letter-spacing: -0.022em; line-height: 1.15; color: #F2EDE3; margin-top: 18px; }
.title .hook { color: #C4956A; font-size: 76px; font-weight: 900; letter-spacing: -0.03em; }
.lede { font-size: 17px; font-weight: 400; font-style: italic; color: rgba(255,255,255,0.55); margin-top: 18px; max-width: 480px; line-height: 1.5; }

/* 右侧焦点视觉 */
.hero-art { position: absolute; right: 50px; top: 50%; transform: translateY(-50%); z-index: 1; opacity: 0.75; }

/* 品牌角标 */
.brand { position: absolute; top: 20px; left: 24px; display: flex; align-items: center; gap: 8px; z-index: 3; }
.brand svg { width: 22px; height: 22px; }
.brand-text { font-size: 11px; font-weight: 600; color: rgba(255,255,255,0.5); letter-spacing: 1px; }

.subtitle { position: absolute; bottom: 24px; right: 30px; font-size: 12px; color: rgba(255,255,255,0.3); z-index: 3; }
</style>
</head>
<body>
<div class="toolbar">
  <button onclick="downloadCover('main')">下载头图 (900x383)</button>
  <button onclick="downloadCover('secondary')">下载次图 (200x200)</button>
</div>

<div class="cover" id="cover-main">
  <div class="bg-dark"></div>
  <div class="bg-gradient"></div>

  <!-- 右侧焦点视觉：终端窗口 SVG -->
  <div class="hero-art">
    <svg width="300" height="240" viewBox="0 0 300 240" fill="none" xmlns="http://www.w3.org/2000/svg">
      <!-- 终端窗口 -->
      <rect x="10" y="10" width="280" height="220" rx="12" fill="rgba(44,42,40,0.8)" stroke="rgba(196,149,106,0.3)" stroke-width="1.5"/>
      <!-- 标题栏 -->
      <rect x="10" y="10" width="280" height="32" rx="12" fill="rgba(44,42,40,0.95)"/>
      <rect x="10" y="30" width="280" height="12" fill="rgba(44,42,40,0.95)"/>
      <circle cx="30" cy="26" r="5" fill="#FF5F57"/>
      <circle cx="48" cy="26" r="5" fill="#FFBD2E"/>
      <circle cx="66" cy="26" r="5" fill="#28CA42"/>
      <text x="150" y="29" text-anchor="middle" font-size="11" fill="rgba(255,255,255,0.5)" font-family="monospace">claude code</text>
      <!-- 终端内容 -->
      <text x="28" y="68" font-size="12" fill="#C4956A" font-family="monospace">$</text>
      <text x="42" y="68" font-size="12" fill="#F2EDE3" font-family="monospace">claude --worktree feature</text>
      <text x="28" y="92" font-size="12" fill="rgba(255,255,255,0.4)" font-family="monospace">Creating worktree...</text>
      <text x="28" y="116" font-size="12" fill="#A8C97F" font-family="monospace">✓ Ready in .claude/worktrees/</text>
      <text x="28" y="148" font-size="12" fill="#C4956A" font-family="monospace">$</text>
      <text x="42" y="148" font-size="12" fill="#F2EDE3" font-family="monospace">ultrathink</text>
      <text x="28" y="172" font-size="12" fill="rgba(255,255,255,0.4)" font-family="monospace">Reasoning depth: maximum</text>
      <text x="28" y="196" font-size="12" fill="#A8C97F" font-family="monospace">✓ Adaptive thinking enabled</text>
    </svg>
  </div>

  <!-- 品牌角标 -->
  <div class="brand">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="13" cy="16" r="10" stroke="rgba(255,255,255,0.5)" stroke-width="2.2" fill="none"/>
      <ellipse cx="13" cy="8.5" rx="7" ry="1.5" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" fill="none"/>
      <ellipse cx="14" cy="17" rx="3.5" ry="2" fill="#C4956A"/>
      <polygon points="10,17 7.5,14.5 7.5,19.5" fill="#C4956A"/>
      <circle cx="16" cy="16.3" r="0.7" fill="#F2EDE3"/>
      <line x1="26" y1="4" x2="26" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
      <path d="M26 16 Q26 22 22 22" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="26" cy="4" r="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
    </svg>
    <span class="brand-text">墨筝</span>
  </div>

  <!-- 内容：左对齐 Medium 风格 -->
  <div class="content">
    <div class="kicker">BEST PRACTICES · CLI</div>
    <h1 class="title">Claude Code<br><span class="hook">48</span> 条实践</h1>
    <p class="lede">从基础操作到高阶技巧，半年使用心得全整理</p>
  </div>

  <div class="subtitle">Tips & Best Practices</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
function flattenAlpha(canvas, bgColor) {
  const isTransparent = !bgColor || bgColor === 'transparent' || bgColor === 'rgba(0, 0, 0, 0)';
  const flat = document.createElement('canvas');
  flat.width = canvas.width; flat.height = canvas.height;
  const ctx = flat.getContext('2d');
  ctx.fillStyle = isTransparent ? '#1C1C1E' : bgColor;
  ctx.fillRect(0, 0, flat.width, flat.height);
  ctx.drawImage(canvas, 0, 0);
  return flat;
}

async function renderSlide(el) {
  const origRadius = el.style.borderRadius;
  el.style.borderRadius = '0';
  const bgEl = el.querySelector('.bg-light, .bg-dark');
  const bg = bgEl ? getComputedStyle(bgEl).backgroundColor : getComputedStyle(el).backgroundColor;
  const raw = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null });
  el.style.borderRadius = origRadius;
  return flattenAlpha(raw, bg);
}

async function downloadCover(type) {
  const el = document.getElementById('cover-main');
  const canvas = await renderSlide(el);

  if (type === 'main') {
    canvas.toBlob(blob => saveAs(blob, 'cover-900x383.png'), 'image/png');
  } else {
    // 次图：从左下角裁 200x200（Medium 风格，含 kicker + 标题首字）
    const crop = document.createElement('canvas');
    crop.width = 400; crop.height = 400;
    const ctx = crop.getContext('2d');
    const sx = 80, sy = (canvas.height - 400) / 2;
    ctx.drawImage(canvas, sx, sy, 400, 400, 0, 0, 400, 400);
    crop.toBlob(blob => saveAs(blob, 'cover-200x200.png'), 'image/png');
  }
}
</script>
</body>
</html>
