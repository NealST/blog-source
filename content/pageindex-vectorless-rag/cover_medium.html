<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>头图（Medium 风格）— 无向量 RAG，94% 准确度</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0E0E10; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center;
    padding: 80px 20px 80px;
    font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
  }
  .toolbar {
    position: fixed; top: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.92); padding: 14px 20px;
    display: flex; gap: 12px; justify-content: center; z-index: 100;
    backdrop-filter: blur(10px);
  }
  .toolbar button {
    background: #C4956A; color: #1C1C1E; border: none;
    padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: background 0.2s;
  }
  .toolbar button:hover { background: #d4a57a; }

  /* ─── Cover ─── */
  .cover {
    width: 900px; height: 383px; position: relative; overflow: hidden;
    border-radius: 8px;
  }
  .bg-dark { position: absolute; inset: 0; background: #1C1C1E; }

  /* 焦点视觉：右侧大尺寸树状图，opacity 0.78 当主角 */
  .hero-art {
    position: absolute; right: 56px; top: 50%; transform: translateY(-50%);
    z-index: 1; opacity: 0.78;
  }

  /* 品牌角标 */
  .brand {
    position: absolute; top: 22px; left: 28px;
    display: flex; align-items: center; gap: 8px; z-index: 3;
  }
  .brand svg { width: 22px; height: 22px; }
  .brand-text {
    font-size: 11px; font-weight: 600;
    color: rgba(255,255,255,0.45); letter-spacing: 1px;
  }

  /* 内容：左对齐 */
  .content {
    position: absolute; inset: 0;
    display: flex; flex-direction: column; justify-content: center;
    padding: 0 380px 0 70px; z-index: 2;
  }

  /* 编辑标签：金色细横线 + 小写字距 */
  .kicker {
    font-size: 11px; font-weight: 700; letter-spacing: 0.18em;
    color: #C4956A; text-transform: uppercase;
    padding-top: 12px; position: relative;
    margin-bottom: 18px;
  }
  .kicker::before {
    content: ''; position: absolute; top: 0; left: 0;
    width: 32px; height: 1px; background: #C4956A;
  }

  /* 主标题 */
  .title {
    font-size: 56px; font-weight: 800; letter-spacing: -0.022em;
    line-height: 1.1; color: #F2EDE3;
  }
  .title .hook {
    color: #C4956A; font-size: 80px; font-weight: 900;
    letter-spacing: -0.03em; line-height: 1;
    vertical-align: -2px; padding: 0 4px;
  }

  /* 一句话副标题 */
  .lede {
    font-size: 18px; font-weight: 400; font-style: italic;
    color: rgba(255,255,255,0.55);
    margin-top: 20px; max-width: 480px; line-height: 1.5;
    letter-spacing: 0.2px;
  }

  /* ─── 次图（200×200，从主图左下裁出 kicker + 标题首行） ─── */
  .preview-secondary-hint {
    margin-top: 24px; font-size: 12px; color: rgba(255,255,255,0.4);
  }
</style>
</head>
<body>

<div class="toolbar">
  <button onclick="downloadCover('main')">下载头图 (900×383)</button>
  <button onclick="downloadCover('secondary')">下载次图 (200×200)</button>
</div>

<div class="cover" id="cover-main">
  <div class="bg-dark"></div>

  <!-- 焦点视觉：树形检索结构（PageIndex 核心隐喻） -->
  <div class="hero-art">
    <svg width="290" height="240" viewBox="0 0 290 240" fill="none">
      <!-- 根节点 -->
      <rect x="115" y="10" width="60" height="22" rx="4"
            stroke="#C4956A" stroke-width="1.5" fill="rgba(196,149,106,0.08)"/>
      <text x="145" y="25" font-size="9" fill="#C4956A" text-anchor="middle"
            font-family="SF Mono, Menlo, monospace" letter-spacing="1">DOC</text>

      <!-- 主干连线 -->
      <line x1="145" y1="32" x2="145" y2="55" stroke="#F2EDE3" stroke-width="1" opacity="0.5"/>
      <line x1="145" y1="55" x2="55"  y2="80" stroke="#F2EDE3" stroke-width="1" opacity="0.4"/>
      <line x1="145" y1="55" x2="145" y2="80" stroke="#F2EDE3" stroke-width="1" opacity="0.4"/>
      <line x1="145" y1="55" x2="235" y2="80" stroke="#F2EDE3" stroke-width="1" opacity="0.4"/>

      <!-- 第二层 -->
      <rect x="30"  y="80" width="50" height="20" rx="3" stroke="#F2EDE3" stroke-width="1" opacity="0.55" fill="none"/>
      <rect x="120" y="80" width="50" height="20" rx="3" stroke="#F2EDE3" stroke-width="1" opacity="0.55" fill="none"/>
      <rect x="210" y="80" width="50" height="20" rx="3" stroke="#C4956A" stroke-width="1.5" fill="rgba(196,149,106,0.15)"/>

      <!-- 命中节点闪光 -->
      <circle cx="235" cy="90" r="14" stroke="#C4956A" stroke-width="0.8" fill="none" opacity="0.4"/>
      <circle cx="235" cy="90" r="20" stroke="#C4956A" stroke-width="0.5" fill="none" opacity="0.2"/>

      <!-- 第二层连第三层（聚焦命中那条） -->
      <line x1="235" y1="100" x2="200" y2="125" stroke="#C4956A" stroke-width="1.2" opacity="0.7"/>
      <line x1="235" y1="100" x2="270" y2="125" stroke="#C4956A" stroke-width="1.2" opacity="0.7"/>
      <line x1="235" y1="100" x2="235" y2="125" stroke="#C4956A" stroke-width="1.2" opacity="0.7"/>

      <!-- 其他第二层弱化连线 -->
      <line x1="55"  y1="100" x2="40"  y2="125" stroke="#F2EDE3" stroke-width="0.8" opacity="0.25"/>
      <line x1="55"  y1="100" x2="70"  y2="125" stroke="#F2EDE3" stroke-width="0.8" opacity="0.25"/>
      <line x1="145" y1="100" x2="130" y2="125" stroke="#F2EDE3" stroke-width="0.8" opacity="0.25"/>
      <line x1="145" y1="100" x2="160" y2="125" stroke="#F2EDE3" stroke-width="0.8" opacity="0.25"/>

      <!-- 第三层小卡（叶子页面） -->
      <rect x="25"  y="125" width="30" height="14" rx="2" stroke="#F2EDE3" stroke-width="0.8" opacity="0.3" fill="none"/>
      <rect x="60"  y="125" width="30" height="14" rx="2" stroke="#F2EDE3" stroke-width="0.8" opacity="0.3" fill="none"/>
      <rect x="115" y="125" width="30" height="14" rx="2" stroke="#F2EDE3" stroke-width="0.8" opacity="0.3" fill="none"/>
      <rect x="150" y="125" width="30" height="14" rx="2" stroke="#F2EDE3" stroke-width="0.8" opacity="0.3" fill="none"/>
      <rect x="185" y="125" width="30" height="14" rx="2"
            stroke="#C4956A" stroke-width="1.4" fill="rgba(196,149,106,0.25)"/>
      <rect x="220" y="125" width="30" height="14" rx="2"
            stroke="#C4956A" stroke-width="1.4" fill="rgba(196,149,106,0.25)"/>
      <rect x="255" y="125" width="30" height="14" rx="2"
            stroke="#C4956A" stroke-width="1.4" fill="rgba(196,149,106,0.25)"/>

      <!-- 命中页码 -->
      <text x="200" y="135" font-size="7" fill="#F2EDE3" text-anchor="middle" font-family="SF Mono, monospace">P12</text>
      <text x="235" y="135" font-size="7" fill="#F2EDE3" text-anchor="middle" font-family="SF Mono, monospace">P28</text>
      <text x="270" y="135" font-size="7" fill="#F2EDE3" text-anchor="middle" font-family="SF Mono, monospace">P41</text>

      <!-- 底部 query 流向 -->
      <line x1="20" y1="180" x2="180" y2="180" stroke="#C4956A" stroke-width="1" opacity="0.5" stroke-dasharray="3,3"/>
      <polygon points="178,176 188,180 178,184" fill="#C4956A" opacity="0.7"/>
      <text x="20" y="172" font-size="8" fill="rgba(255,255,255,0.45)" font-family="SF Mono, monospace" letter-spacing="1">QUERY</text>
      <text x="200" y="184" font-size="8" fill="#C4956A" font-family="SF Mono, monospace" letter-spacing="1">ANSWER</text>

      <!-- 底部说明 -->
      <text x="145" y="215" font-size="9" fill="rgba(255,255,255,0.3)" text-anchor="middle"
            font-family="-apple-system, sans-serif" letter-spacing="0.5">tree-based retrieval</text>
    </svg>
  </div>

  <!-- 品牌角标 -->
  <div class="brand">
    <svg viewBox="0 0 32 32" fill="none">
      <circle cx="13" cy="16" r="10" stroke="rgba(255,255,255,0.5)" stroke-width="2.2" fill="none"/>
      <ellipse cx="13" cy="8.5" rx="7" ry="1.5" stroke="rgba(255,255,255,0.3)" stroke-width="1.2" fill="none"/>
      <ellipse cx="14" cy="17" rx="3.5" ry="2" fill="#C4956A"/>
      <polygon points="10,17 7.5,14.5 7.5,19.5" fill="#C4956A"/>
      <circle cx="16" cy="16.3" r="0.7" fill="#F2EDE3"/>
      <line x1="26" y1="4" x2="26" y2="16" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round"/>
      <path d="M26 16 Q26 22 22 22" stroke="rgba(255,255,255,0.5)" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="26" cy="4" r="2" stroke="rgba(255,255,255,0.5)" stroke-width="1.5" fill="none"/>
    </svg>
    <span class="brand-text">墨筝</span>
  </div>

  <!-- 内容（左对齐） -->
  <div class="content">
    <div class="kicker">RAG · DEEP DIVE</div>
    <h1 class="title">无向量 RAG，<span class="hook">94%</span> 准确度</h1>
    <p class="lede">不分块，不 Embedding。一棵目录树，替代向量数据库。</p>
  </div>
</div>

<div class="preview-secondary-hint">↑ 主图（900×383）｜次图自动从左下裁切 kicker + 标题区域</div>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
function flattenAlpha(canvas, bgColor) {
  const isTransparent = !bgColor || bgColor === 'transparent' || bgColor === 'rgba(0, 0, 0, 0)';
  const flat = document.createElement('canvas');
  flat.width = canvas.width; flat.height = canvas.height;
  const ctx = flat.getContext('2d');
  ctx.fillStyle = isTransparent ? '#1C1C1E' : bgColor;
  ctx.fillRect(0, 0, flat.width, flat.height);
  ctx.drawImage(canvas, 0, 0);
  return flat;
}

async function renderSlide(el) {
  const origRadius = el.style.borderRadius;
  el.style.borderRadius = '0';
  const bgEl = el.querySelector('.bg-light, .bg-dark');
  const bg = bgEl ? getComputedStyle(bgEl).backgroundColor : getComputedStyle(el).backgroundColor;
  const raw = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null });
  el.style.borderRadius = origRadius;
  return flattenAlpha(raw, bg);
}

async function downloadCover(type) {
  const el = document.getElementById('cover-main');
  const canvas = await renderSlide(el);
  if (type === 'main') {
    canvas.toBlob(blob => saveAs(blob, 'pageindex-rag-头图-medium.png'), 'image/png');
  } else {
    // 次图：从主图左侧裁 200×200（含 kicker + 标题首行 + hook 数字）
    // 主图 900×383 在 scale=2 下变 1800×766，左侧 50px-450px 含完整文字区
    const SRC_X = 100;       // 跳过左边距，保留 kicker
    const SRC_Y = 130;       // 让 kicker 落在顶部
    const SRC_SIZE = 500;    // 抓 500×500 区域再缩到 400×400（2x 输出）
    const crop = document.createElement('canvas');
    crop.width = 400; crop.height = 400;
    const ctx = crop.getContext('2d');
    ctx.drawImage(canvas, SRC_X, SRC_Y, SRC_SIZE, SRC_SIZE, 0, 0, 400, 400);
    crop.toBlob(blob => saveAs(blob, 'pageindex-rag-次图-medium.png'), 'image/png');
  }
}
</script>
</body>
</html>
