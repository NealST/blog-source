<!DOCTYPE html>

<title>头图 — 一种新的思路，RAG 准确度从 61% 到 94%</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #111; display: flex; flex-direction: column; align-items: center; padding: 70px 20px 80px; font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif; }
  .toolbar { position: fixed; top: 0; left: 0; right: 0; background: rgba(0,0,0,0.9); padding: 14px 20px; display: flex; gap: 12px; justify-content: center; z-index: 100; backdrop-filter: blur(10px); }
  .toolbar button { background: #C4956A; color: #1C1C1E; border: none; padding: 10px 24px; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; transition: background 0.2s; }
  .toolbar button:hover { background: #d4a57a; }

  .cover { width: 900px; height: 383px; position: relative; overflow: hidden; border-radius: 8px; }
  .bg-dark { position: absolute; inset: 0; background: #1C1C1E; }
  .bg-gradient { position: absolute; inset: 0; background: radial-gradient(ellipse at 25% 40%, rgba(196,149,106,0.07) 0%, transparent 55%), radial-gradient(ellipse at 75% 60%, rgba(196,149,106,0.05) 0%, transparent 50%); }

  /* 品牌角标 */
  .brand { position: absolute; top: 20px; left: 24px; display: flex; align-items: center; gap: 8px; z-index: 3; }
  .brand svg { width: 26px; height: 26px; }
  .brand-text { font-size: 12px; font-weight: 600; color: rgba(255,255,255,0.45); letter-spacing: 1px; }

  /* 内容层 */
  .content { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 2; padding: 0 80px; }
  .main-title { font-size: 56px; font-weight: 900; color: #F2EDE3; text-align: center; line-height: 1.3; letter-spacing: 1px; }
  .main-title .accent { color: #C4956A; }
  .sub-line { font-size: 24px; color: rgba(255,255,255,0.45); margin-top: 14px; text-align: center; letter-spacing: 0.5px; font-weight: 400; }
  .keyword-row { display: inline-flex; align-items: center; gap: 12px; margin-top: 18px; padding: 5px 16px; border: 1.5px solid rgba(196,149,106,0.35); border-radius: 5px; }
  .keyword-row span { font-size: 13px; font-weight: 600; color: #C4956A; letter-spacing: 0.5px; }
  .keyword-row .sep { color: rgba(196,149,106,0.25); font-weight: 300; }

  /* 底部标签 */
  .bottom-tags { position: absolute; bottom: 16px; right: 24px; display: flex; gap: 8px; z-index: 3; }
  .bottom-tags span { font-size: 11px; color: rgba(255,255,255,0.3); letter-spacing: 0.5px; }

  /* 左侧树装饰 */

  /* 右侧文档装饰 */

</style>

<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
function flattenAlpha(canvas, bgColor) {
  const isTransparent = !bgColor || bgColor === 'transparent' || bgColor === 'rgba(0, 0, 0, 0)';
  const flat = document.createElement('canvas');
  flat.width = canvas.width; flat.height = canvas.height;
  const ctx = flat.getContext('2d');
  ctx.fillStyle = isTransparent ? '#1C1C1E' : bgColor;
  ctx.fillRect(0, 0, flat.width, flat.height);
  ctx.drawImage(canvas, 0, 0);
  return flat;
}

async function renderSlide(el) {
  const origRadius = el.style.borderRadius;
  el.style.borderRadius = '0';
  const bgEl = el.querySelector('.bg-light, .bg-dark');
  const bg = bgEl ? getComputedStyle(bgEl).backgroundColor : getComputedStyle(el).backgroundColor;
  const raw = await html2canvas(el, { scale: 2, useCORS: true, backgroundColor: null });
  el.style.borderRadius = origRadius;
  return flattenAlpha(raw, bg);
}

async function downloadCover(type) {
  const el = document.getElementById('cover-main');
  const canvas = await renderSlide(el);
  if (type === 'main') {
    canvas.toBlob(blob => saveAs(blob, 'pageindex-rag-头图.png'), 'image/png');
  } else {
    const size = Math.min(canvas.width, canvas.height);
    const sx = (canvas.width - size) / 2;
    const sy = (canvas.height - size) / 2;
    const crop = document.createElement('canvas');
    crop.width = 400; crop.height = 400;
    const ctx = crop.getContext('2d');
    ctx.drawImage(canvas, sx, sy, size, size, 0, 0, 400, 400);
    crop.toBlob(blob => saveAs(blob, 'pageindex-rag-次图.png'), 'image/png');
  }
}
</script>
